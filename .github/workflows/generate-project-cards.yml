permissions:
  contents: write
  
name: Generate project cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Chrome
        run: |    
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: |
          npm install puppeteer sharp

      - name: Generate cards
        run: node scripts/generateCards.js

      - name: Commit cards
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git add assets/projects
          git commit -m "update project cards" || echo "no changes"
          git push