name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  update-readme:
    name: WakaTime DevMetrics
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: athul/waka-readme@master
        with:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}

          SHOW_TITLE: true
          TIME_RANGE: all_time
          LANG_COUNT: 8
          SHOW_TIME: true
          SHOW_TOTAL: true
          STOP_AT_OTHER: true

          SHOW_DAYS_OF_WEEK: true
          SHOW_LOC_CHART: false

          IGNORED_LANGUAGES: YAML JSON TOML

          TARGET_BRANCH: main
          COMMIT_MESSAGE: Updated WakaTime metrics
